
<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arogya Voice – ఆరోగ్య వాయిస్</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Tiro+Telugu:ital@0;1&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root {
    --leaf: #2d7a4f;
    --leaf-light: #3da068;
    --leaf-dark: #1b5c38;
    --turmeric: #e8a020;
    --turmeric-light: #f5b830;
    --sky: #1e6fa8;
    --sky-light: #2e85c8;
    --earth: #8b4513;
    --critical: #d94040;
    --warn: #e07820;
    --ok: #2d7a4f;
    --bg: #f4f7f2;
    --surface: #ffffff;
    --surface2: #eef3ea;
    --border: #d0dbc8;
    --text: #1a2e1a;
    --text2: #4a6040;
    --text3: #7a9070;
    --shadow: 0 4px 24px rgba(45,122,79,0.10);
    --shadow-lg: 0 8px 40px rgba(45,122,79,0.18);
    --radius: 18px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .telugu { font-family: 'Tiro Telugu', 'Sora', sans-serif; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface2); }
  ::-webkit-scrollbar-thumb { background: var(--leaf); border-radius: 3px; }

  /* ── LAYOUT ── */
  .app-shell { display: flex; min-height: 100vh; }
  .sidebar {
    width: 260px; min-width: 260px;
    background: var(--leaf-dark);
    display: flex; flex-direction: column;
    padding: 0;
    position: fixed; top: 0; left: 0; height: 100vh;
    z-index: 100;
    box-shadow: 4px 0 24px rgba(0,0,0,0.15);
    transition: transform 0.3s;
  }
  .sidebar-brand {
    padding: 28px 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.12);
  }
  .brand-logo {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--turmeric);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .brand-name {
    font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.3px;
  }
  .brand-sub {
    font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 2px;
    font-family: 'Tiro Telugu', serif;
  }
  .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
  .nav-section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
    color: rgba(255,255,255,0.4); text-transform: uppercase;
    padding: 8px 12px 6px; margin-top: 8px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 12px;
    color: rgba(255,255,255,0.75); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; margin-bottom: 2px;
    border: 1.5px solid transparent;
  }
  .nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .nav-item.active {
    background: var(--turmeric); color: #fff;
    border-color: rgba(255,255,255,0.2);
    box-shadow: 0 2px 12px rgba(232,160,32,0.4);
  }
  .nav-icon { font-size: 18px; min-width: 22px; text-align: center; }
  .nav-badge {
    margin-left: auto; background: var(--critical);
    color: #fff; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 20px;
  }
  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .user-chip {
    display: flex; align-items: center; gap: 10px;
  }
  .user-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--turmeric); display: flex; align-items: center;
    justify-content: center; font-size: 16px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .user-name { font-size: 13px; font-weight: 600; color: #fff; }
  .user-loc { font-size: 11px; color: rgba(255,255,255,0.5); }

  .main-content {
    margin-left: 260px; flex: 1;
    min-height: 100vh; padding: 0;
    display: flex; flex-direction: column;
  } 
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px 32px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 50;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }
  .topbar-title { font-size: 20px; font-weight: 700; color: var(--text); }
  .topbar-sub { font-size: 12px; color: var(--text3); margin-top: 2px; font-family: 'Tiro Telugu', serif; }
  .topbar-actions { display: flex; align-items: center; gap: 12px; }
  .page-body { padding: 32px; flex: 1; }

  /* ── CARDS ── */
  .card {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-header {
    padding: 20px 24px 0; display: flex; align-items: center;
    justify-content: space-between;
  }
  .card-title {
    font-size: 16px; font-weight: 700; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .card-body { padding: 20px 24px 24px; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    border: none; transition: all 0.2s; font-family: 'Sora', sans-serif;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--leaf); color: #fff;
    box-shadow: 0 2px 12px rgba(45,122,79,0.3);
  }
  .btn-primary:hover { background: var(--leaf-dark); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(45,122,79,0.4); }
  .btn-secondary {
    background: var(--surface2); color: var(--text);
    border: 1.5px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }
  .btn-warn { background: var(--turmeric); color: #fff; box-shadow: 0 2px 10px rgba(232,160,32,0.35); }
  .btn-warn:hover { background: #c8890e; }
  .btn-danger { background: var(--critical); color: #fff; }
  .btn-lg { padding: 14px 28px; font-size: 16px; border-radius: 14px; }
  .btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 8px; }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none !important; }

  /* ── STATUS PILLS ── */
  .status-ok { background: #dcf5e7; color: #1b5c38; border: 1px solid #a8e0bc; }
  .status-warn { background: #fff3d6; color: #7a4a00; border: 1px solid #f5cc80; }
  .status-critical { background: #fde8e8; color: #8b1a1a; border: 1px solid #f0a0a0; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-ok { background: var(--ok); }
  .dot-warn { background: var(--warn); }
  .dot-critical { background: var(--critical); }

  /* ── GRID ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

  /* ── STAT CARD ── */
  .stat-card {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 20px 22px;
    box-shadow: var(--shadow); position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  }
  .stat-card.ok::before { background: var(--leaf); }
  .stat-card.warn::before { background: var(--turmeric); }
  .stat-card.critical::before { background: var(--critical); }
  .stat-card.sky::before { background: var(--sky); }
  .stat-label { font-size: 12px; color: var(--text3); font-weight: 500; margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 800; color: var(--text); line-height: 1; }
  .stat-unit { font-size: 13px; font-weight: 500; color: var(--text3); margin-left: 4px; }
  .stat-status { margin-top: 10px; }
  .stat-icon {
    position: absolute; right: 18px; top: 22px;
    font-size: 32px; opacity: 0.15;
  }

  /* ── UPLOAD ZONE ── */
  .upload-zone {
    border: 2.5px dashed var(--border);
    border-radius: var(--radius); padding: 48px 32px;
    text-align: center; cursor: pointer;
    transition: all 0.2s; background: var(--surface2);
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--leaf); background: #e8f5ee; }
  .upload-icon { font-size: 48px; margin-bottom: 14px; }
  .upload-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .upload-sub { font-size: 13px; color: var(--text3); }
  .upload-types {
    display: flex; gap: 8px; justify-content: center; margin-top: 16px;
    flex-wrap: wrap;
  }
  .type-badge {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text2); font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 6px;
  }

  /* ── VOICE BUTTON ── */
  .voice-btn {
    width: 100px; height: 100px; border-radius: 50%;
    background: var(--leaf); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; color: #fff;
    box-shadow: 0 0 0 0 rgba(45,122,79,0.4);
    transition: all 0.2s; position: relative;
  }
  .voice-btn.listening {
    background: var(--critical);
    animation: pulse-ring 1.5s ease-in-out infinite;
    box-shadow: 0 0 0 0 rgba(217,64,64,0.4);
  }
  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(217,64,64,0.5); }
    70% { box-shadow: 0 0 0 20px rgba(217,64,64,0); }
    100% { box-shadow: 0 0 0 0 rgba(217,64,64,0); }
  }
  .voice-btn:hover:not(.listening) { background: var(--leaf-dark); transform: scale(1.05); }

  /* ── CHAT ── */
  .chat-messages {
    height: 340px; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    background: var(--surface2); border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .msg { max-width: 82%; }
  .msg-user { align-self: flex-end; }
  .msg-bot { align-self: flex-start; }
  .msg-bubble {
    padding: 12px 16px; border-radius: 16px;
    font-size: 14px; line-height: 1.6;
  }
  .msg-user .msg-bubble {
    background: var(--leaf); color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg-bot .msg-bubble {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
  }
  .msg-time { font-size: 10px; color: var(--text3); margin-top: 4px; text-align: right; }

  /* ── REMINDER CARD ── */
  .reminder-card {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 16px 20px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: var(--shadow); transition: all 0.2s;
  }
  .reminder-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
  .reminder-icon-wrap {
    width: 52px; height: 52px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .reminder-morning { background: #fff3d6; }
  .reminder-afternoon { background: #e0f0ff; }
  .reminder-evening { background: #f0e8ff; }
  .reminder-night { background: #ffe8e8; }
  .reminder-info { flex: 1; }
  .reminder-med { font-size: 15px; font-weight: 700; color: var(--text); }
  .reminder-dose { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .reminder-time { font-size: 13px; font-weight: 600; color: var(--text2); }
  .reminder-check {
    width: 28px; height: 28px; border-radius: 50%; border: 2.5px solid var(--border);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: all 0.2s; flex-shrink: 0;
  }
  .reminder-check.done { background: var(--leaf); border-color: var(--leaf); color: #fff; }

  /* ── REPORT FILE ITEM ── */
  .report-item {
    background: var(--surface); border-radius: var(--radius-sm);
    border: 1px solid var(--border); padding: 14px 18px;
    display: flex; align-items: center; gap: 14px;
    transition: all 0.2s; cursor: pointer;
  }
  .report-item:hover { border-color: var(--leaf); box-shadow: var(--shadow); }
  .report-file-icon {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--surface2); display: flex; align-items: center;
    justify-content: center; font-size: 22px; flex-shrink: 0;
  }
  .report-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .report-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .report-actions { margin-left: auto; display: flex; gap: 8px; }

  /* ── HEALTH INDICATOR BAR ── */
  .indicator-bar {
    height: 8px; border-radius: 4px; background: var(--surface2);
    overflow: hidden; margin-top: 8px;
  }
  .indicator-fill {
    height: 100%; border-radius: 4px; transition: width 1s ease;
  }
  .fill-ok { background: linear-gradient(90deg, #4ade80, #22c55e); }
  .fill-warn { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
  .fill-critical { background: linear-gradient(90deg, #f87171, #ef4444); }

  /* ── SUGGESTION CARD ── */
  .suggestion-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px; background: var(--surface2); border-radius: var(--radius-sm);
    border: 1px solid var(--border); margin-bottom: 10px;
  }
  .suggestion-icon { font-size: 24px; flex-shrink: 0; margin-top: 2px; }
  .suggestion-text { font-size: 14px; color: var(--text); line-height: 1.6; }
  .suggestion-text strong { color: var(--leaf-dark); }

  /* ── LANDING ── */
  .landing-hero {
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center; flex-direction: column;
    background: linear-gradient(135deg, var(--leaf-dark) 0%, #1a4a28 40%, #0d3020 100%);
    position: relative; overflow: hidden;
  }
  .hero-bg-pattern {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle at 20% 30%, rgba(232,160,32,0.12) 0%, transparent 50%),
                      radial-gradient(circle at 80% 70%, rgba(61,160,104,0.15) 0%, transparent 50%),
                      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .hero-content { position: relative; z-index: 2; text-align: center; padding: 32px; max-width: 700px; }
  .hero-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.85); font-size: 12px; font-weight: 600;
    padding: 6px 16px; border-radius: 20px; margin-bottom: 24px;
    backdrop-filter: blur(8px);
  }
  .hero-title {
    font-size: clamp(36px, 6vw, 68px); font-weight: 800; color: #fff;
    line-height: 1.1; letter-spacing: -1px; margin-bottom: 16px;
  }
  .hero-title span { color: var(--turmeric-light); }
  .hero-telugu {
    font-family: 'Tiro Telugu', serif; font-size: clamp(18px, 3vw, 28px);
    color: rgba(255,255,255,0.7); margin-bottom: 28px; line-height: 1.5;
  }
  .hero-desc {
    font-size: 16px; color: rgba(255,255,255,0.65); line-height: 1.7;
    margin-bottom: 36px;
  }
  .hero-cta { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .hero-features {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
    margin-top: 80px; position: relative; z-index: 2;
    padding: 0 32px 32px;
  }
  .hero-feature {
    background: rgba(255,255,255,0.07); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: var(--radius);
    padding: 24px; text-align: center;
  }
  .hero-feature-icon { font-size: 36px; margin-bottom: 12px; }
  .hero-feature-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .hero-feature-sub { font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.6; }

  /* ── LOADING SPINNER ── */
  .spinner {
    width: 32px; height: 32px; border-radius: 50%;
    border: 3px solid var(--surface2); border-top-color: var(--leaf);
    animation: spin 0.8s linear infinite; margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── AI ANALYSIS PANEL ── */
  .analysis-panel {
    background: linear-gradient(135deg, #f0f9f4, #e8f5ee);
    border: 1px solid #b8dfc8; border-radius: var(--radius);
    padding: 24px; margin-top: 16px;
  }
  .analysis-title {
    font-size: 15px; font-weight: 700; color: var(--leaf-dark);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .analysis-text {
    font-size: 14px; line-height: 1.8; color: var(--text);
    font-family: 'Tiro Telugu', 'Sora', sans-serif;
  }

  /* ── TABS ── */
  .tabs { display: flex; gap: 4px; background: var(--surface2); padding: 4px; border-radius: 12px; }
  .tab {
    flex: 1; padding: 10px 16px; border-radius: 9px; font-size: 13px;
    font-weight: 600; cursor: pointer; text-align: center; border: none;
    transition: all 0.2s; font-family: 'Sora', sans-serif;
    background: transparent; color: var(--text3);
  }
  .tab.active { background: var(--surface); color: var(--leaf); box-shadow: 0 1px 6px rgba(0,0,0,0.1); }

  /* ── PROGRESS BAR ── */
  .progress-bar {
    height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-top: 6px;
  }
  .progress-fill {
    height: 100%; border-radius: 3px; transition: width 0.6s ease;
    background: linear-gradient(90deg, var(--leaf), var(--leaf-light));
  }

  /* ── TOAST ── */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
  .toast {
    background: var(--text); color: #fff; padding: 14px 20px;
    border-radius: 12px; font-size: 14px; font-weight: 500;
    box-shadow: 0 4px 24px rgba(0,0,0,0.25); max-width: 320px;
    display: flex; align-items: center; gap: 10px;
    animation: slideIn 0.3s ease;
  }
  .toast.success { background: var(--leaf-dark); }
  .toast.warn { background: var(--warn); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ── INPUT ── */
  .input-field {
    width: 100%; padding: 12px 16px; border-radius: 10px;
    border: 1.5px solid var(--border); background: var(--surface);
    font-size: 14px; font-family: 'Sora', sans-serif; color: var(--text);
    transition: border-color 0.2s; outline: none;
  }
  .input-field:focus { border-color: var(--leaf); box-shadow: 0 0 0 3px rgba(45,122,79,0.12); }
  .input-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .sidebar { transform: translateX(-260px); }
    .sidebar.open { transform: translateX(0); }
    .main-content { margin-left: 0; }
    .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
    .hero-features { grid-template-columns: 1fr; }
    .topbar { padding: 12px 16px; }
    .page-body { padding: 16px; }
    .topbar-title { font-size: 16px; }
  }
  @media (max-width: 600px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    .page-body { padding: 12px; }

// ────────────── BACKEND API ──────────────
// All AI calls go through the local Express server (server.js)
// This keeps the Gemini API key secure and off the browser
const BACKEND = "https://arogyavoice-3.onrender.com";

async function callVoice(message) {
  const res = await fetch(BACKEND + "/api/voice", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });
  if (!res.ok) throw new Error("Server error " + res.status + ". Is the server running? (node server.js)");
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.reply || "No response received.";
}

async function callReport(prompt) {
  const res = await fetch(BACKEND + "/api/report", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt })
  });
  if (!res.ok) throw new Error("Server error " + res.status + ". Is the server running? (node server.js)");
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.analysis || "No analysis received.";
}

// ────────────── UPLOAD PAGE ──────────────
function UploadPage({ apiKey, addReport, addToast, lang = "en" }) {
  const [file, setFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [category, setCategory] = useState('blood');
  const [drag, setDrag] = useState(false);
  const fileRef = useRef();

  const categories = [
    { id:'blood', label:'🩸 Blood Test', te:'రక్త పరీక్ష' },
    { id:'sugar', label:'🍬 Sugar Report', te:'షుగర్ రిపోర్ట్' },
    { id:'prescription', label:'💊 Prescription', te:'ప్రిస్క్రిప్షన్' },
    { id:'lab', label:'🔬 Lab Report', te:'లాబ్ రిపోర్ట్' },
  ];

  const handleFile = (f) => {
    if (!f) return;
    setFile(f); setResult(null);
    if (f.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = e => setPreview(e.target.result);
      reader.readAsDataURL(f);
    } else {
      setPreview(null);
    }
  };

  const analyze = async () => {
    if (!file) { addToast('Please select a file first', 'warn', '📁'); return; }
    setLoading(true);
    setResult(null);
    try {
      const catLabel = categories.find(c => c.id === category)?.label || category;
      const prompt = `You are an expert medical AI assistant. Analyze this ${catLabel} report for a Telugu-speaking rural patient.

Respond in this exact format:

**TELUGU SUMMARY (సారాంశం):**
[Explain in simple Telugu, 2-3 sentences a village person can understand]

**KEY VALUES (ముఖ్యమైన విలువలు):**
[List values: Blood Sugar, Hemoglobin, Blood Pressure etc. with normal ranges]
STATUS: [NORMAL or WARNING or CRITICAL]

**HEALTH INDICATORS:**
- Blood Sugar: [value] | Status: [Normal/High/Low]
- Hemoglobin: [value] | Status: [Normal/High/Low]
- Blood Pressure: [value] | Status: [Normal/High/Low]

**SUGGESTIONS IN TELUGU (సూచనలు):**
[3-4 Telugu health suggestions]

**DOCTOR VISIT NEEDED:** [Yes/No with Telugu reason]`;

      const response = await callReport(prompt);
      const safeR = response || "";
      const status =
        safeR.toUpperCase().includes("CRITICAL") ? "critical" :
        safeR.toUpperCase().includes("WARNING") ? "warn" : "ok";

      addReport({
        name: file.name,
        date: new Date().toLocaleDateString('en-IN'),
        size: (file.size / 1024).toFixed(0) + ' KB',
        type: category,
        category: catLabel,
        status,
        summary: safeR.split('**TELUGU SUMMARY')[1]?.split('**')[1]?.trim() || safeR.substring(0, 200),
        fullAnalysis: safeR,
        preview: preview
      });
      setResult({ text: safeR, status });
      addToast('Report analyzed successfully! ✅', 'success', '✅');
    } catch (e) {
      const errMsg = e.message || 'Unknown error';
      setResult({
        text: '❌ Analysis failed\n\n' + errMsg + '\n\nMake sure the backend server is running:\n  node server.js',
        status: 'warn'
      });
      addToast('Error: ' + errMsg, 'warn', '❌');
    } finally {
      setLoading(false);
    }
  };

 const getStatusColor = (text) => {
  if (text?.includes('Critical') || text?.includes('High')) return 'critical';
  if (text?.includes('Warning') || text?.includes('Borderline')) return 'warn';
  return 'ok';
};

  const renderAnalysis = (text) => {
    if (!text) return null;
    const lines = text.split('\n').filter(l => l.trim());
    return lines.map((line, i) => {
      if (line.startsWith('**') && line.endsWith('**')) {
        return <div key={i} style={{fontWeight:700, fontSize:14, color:'var(--leaf-dark)', marginTop:16, marginBottom:4, borderBottom:'1px solid var(--border)', paddingBottom:4}}>{line.replace(/\*\*/g,'')}</div>;
      }
      if (line.startsWith('- ')) {
        const content = line.substring(2);
        const statusMatch = content.match(/Status: (Normal|High|Low|Critical|Warning)/i);
        const statusType = statusMatch ? (statusMatch[1].toLowerCase() === 'normal' ? 'ok' : statusMatch[1].toLowerCase() === 'high' || statusMatch[1].toLowerCase() === 'critical' ? 'critical' : 'warn') : null;
        return (
          <div key={i} style={{display:'flex', alignItems:'center', gap:8, padding:'8px 12px', margin:'4px 0', background:'var(--surface2)', borderRadius:8, fontSize:13}}>
            <span style={{color:'var(--leaf)'}}>•</span>
            <span style={{flex:1}}>{content.split('| Status:')[0]}</span>
            {statusType && <span className={`status-pill status-${statusType}`}><span className={`status-dot dot-${statusType}`}></span>{statusMatch[1]}</span>}
          </div>
        );
      }
      if (line.includes('STATUS:')) {

// ────────────── VOICE ASSISTANT ──────────────
function VoiceAssistant({ apiKey, addToast }) {
  const [messages, setMessages] = useState([
    { role:'bot', text:'నమస్కారం! నేను మీ ఆరోగ్య సహాయకుడిని. మీ ఆరోగ్య సమస్యలు చెప్పండి, నేను సహాయం చేస్తాను. 🌿', time: new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'}) }
  ]);
  const [listening, setListening] = useState(false);
  const [typing, setTyping] = useState(false);
  const [input, setInput] = useState('');
  const [speaking, setSpeaking] = useState(false);
  const chatRef = useRef();
  const recognitionRef = useRef(null);
  // FIX: ref to hold latest transcript — avoids stale closure in recognition.onend
  const transcriptRef = useRef('');

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages, typing]);

  const addBotMsg = (text) => {
    setMessages(prev => [...prev, {
      role: 'bot', text,
      time: new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'})
    }]);
  };

  const speak = (text) => {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'te-IN';
      utterance.rate = 0.9;
      utterance.onstart = () => setSpeaking(true);
      utterance.onend = () => setSpeaking(false);
      window.speechSynthesis.speak(utterance);
    }
  };

  const sendMessage = async (text) => {
    const trimmed = (text || '').trim();
    if (!trimmed) return;

    setMessages(prev => [...prev, {
      role: 'user', text: trimmed,
      time: new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'})
    }]);
    setInput('');
    transcriptRef.current = '';
    setTyping(true);

    try {
      const reply = await callVoice(trimmed);
      addBotMsg(reply);
      speak(reply.replace(/[*_#]/g, ''));
    } catch(e) {
      const errText = '❌ ' + (e.message || 'Server error. Make sure server.js is running.');
      addBotMsg(errText);
      addToast(errText, 'warn', '❌');
    } finally {
      setTyping(false);
    }
  };

  const startListening = () => {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      addToast('Voice input not supported in this browser', 'warn', '🎙️');
      return;
    }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognitionRef.current = recognition;
    recognition.lang = 'te-IN';
    recognition.continuous = false;
    recognition.interimResults = true;

    recognition.onstart = () => setListening(true);
    recognition.onresult = (e) => {
      // FIX: write to ref AND state so onend closure always has latest value
      const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
      transcriptRef.current = transcript;
      setInput(transcript);
    };
    recognition.onend = () => {
      setListening(false);
      // FIX: use ref (not stale state) to get the transcript
      const finalText = transcriptRef.current;
      if (finalText.trim()) sendMessage(finalText);
    };
    recognition.onerror = (e) => {
      setListening(false);
      if (e.error !== 'no-speech') addToast('Voice error: ' + e.error, 'warn', '🎙️');
    };
    recognition.start();
  };

  const stopListening = () => {
    recognitionRef.current?.stop();
    setListening(false);
  };

  const quickSymptoms = [
    'నాకు జ్వరం ఉంది', 'తల నొప్పి', 'పొట్ట నొప్పి',
    'అలసట అనిపిస్తోంది', 'రక్తపోటు ఎక్కువగా ఉంది', 'షుగర్ లెవెల్ ఎక్కువ'
  ];

  return (
    <div>
      <div className="section-title">🎙️ Voice Health Assistant – వాయిస్ ఆరోగ్య సహాయకుడు</div>
      
      <div className="grid-2" style={{gap:24}}>
        <div>
          <div className="card">
            <div className="card-header">
              <div className="card-title">💬 Chat with AI Doctor</div>
              {speaking && <span className="badge badge-green">🔊 Speaking...</span>}
            </div>
            <div className="card-body">
              <div className="chat-messages" ref={chatRef}>
                {messages.map((m, i) => (
                  <div key={i} className={`msg msg-${m.role}`}>
                    <div className="msg-bubble" style={{fontFamily: 'Tiro Telugu, Sora, sans-serif'}}>
                      {m.role === 'bot' && <span style={{marginRight:6}}>🤖</span>}
                      {m.text}
                    </div>
                    <div className="msg-time">{m.time}</div>
                  </div>
                ))}
                {typing && (
                  <div className="msg msg-bot">
                    <div className="msg-bubble" style={{display:'flex', gap:4, alignItems:'center', padding:'14px 18px'}}>
                      {[0,1,2].map(i => (
                        <div key={i} style={{
                          width:8, height:8, borderRadius:'50%', background:'var(--text3)',
                          animation:'bounce 1s ease infinite', animationDelay: `${i*0.15}s`
                        }} />
                      ))}
                    </div>
                  </div>
                )}
              </div>

              <div style={{marginTop:12, display:'flex', gap:8}}>
                <input
                  className="input-field" style={{flex:1}}
                  placeholder="లక్షణాలు టైప్ చేయండి... (Type symptoms)"
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => { if(e.key === 'Enter' && input.trim()) { const v = input; sendMessage(v); } }}
                />
                <button className="btn btn-primary" onClick={() => { const v = input; sendMessage(v); }} disabled={!input.trim()}>Send</button>
              </div>
            </div>
          </div>
        </div>

        <div>
          <div className="card mb-4">
            <div className="card-header"><div className="card-title">🎙️ Voice Input – వాయిస్ ఇన్‌పుట్</div></div>
            <div className="card-body" style={{textAlign:'center', padding:'32px 24px'}}>
              <button
                className={`voice-btn ${listening ? 'listening' : ''}`}
                onClick={listening ? stopListening : startListening}
                style={{margin:'0 auto 20px'}}
              >
                {listening ? '⏹️' : '🎙️'}
              </button>
              <div style={{fontSize:16, fontWeight:700, color: listening ? 'var(--critical)' : 'var(--text2)'}}>
                {listening ? '🔴 Recording... Speak in Telugu' : '🎙️ Press to speak in Telugu'}
              </div>
              <div style={{fontSize:13, color:'var(--text3)', marginTop:6, fontFamily:'Tiro Telugu, serif'}}>
                {listening ? 'వినుతున్నాం... తెలుగులో మాట్లాడండి' : 'తెలుగులో మాట్లాడడానికి నొక్కండి'}
              </div>
              {input && (
                <div style={{marginTop:16, padding:'10px 16px', background:'var(--surface2)', borderRadius:10, fontSize:14, fontFamily:'Tiro Telugu, serif', color:'var(--text)'}}>
                  "{input}"
                </div>
              )}
            </div>
          </div>

          <div className="card">
            <div className="card-header"><div className="card-title">⚡ Quick Symptoms</div></div>
            <div className="card-body">
              <div style={{display:'flex', flexWrap:'wrap', gap:8}}>
                {quickSymptoms.map((s, i) => (
                  <button key={i} className="btn btn-secondary btn-sm"
                    style={{fontFamily:'Tiro Telugu, serif', fontSize:12}}
                    onClick={() => sendMessage(s)}>
                    {s}
                  </button>
                ))}
              </div>
              <div className="divider" />
              <div style={{fontSize:12, color:'var(--text3)'}}>
                💡 <strong>Tip:</strong> Browser needs microphone permission for voice input. Chrome/Edge works best with Telugu speech recognition.
              </div>
            </div>
          </div>
        </div>
      </div>
      <style>{`
        @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }
      `}</style>
    </div>
  );
}

      return;
    }
    setLoading(true);
    setPageError(null);
    try {
      const reportSummary = reports.length > 0
        ? reports.map(r => `${r.category}: ${r.summary || 'uploaded'}`).join('; ')
        : 'No reports uploaded yet, provide general health suggestions';

      const prompt = `Based on these medical reports: ${reportSummary}

Generate health suggestions in Telugu for a rural Indian patient.
IMPORTANT: Return ONLY a raw JSON object. No markdown, no backticks, no explanation text.
{"diet":["Telugu tip 1","Telugu tip 2","Telugu tip 3"],"lifestyle":["Telugu tip 1","Telugu tip 2","Telugu tip 3"],"preventive":["Telugu tip 1","Telugu tip 2","Telugu tip 3"],"warnings":["Telugu warning if any critical issue"],"overall":"One sentence overall health status in Telugu with emoji"}`;

      const response = await callReport(prompt);
      let clean = response.replace(/\`\`\`json|\`\`\`/gi, '').trim();

      {pageError && !loading && (
        <div style={{
          background:'#fde8e8', border:'1.5px solid #f0a0a0', borderRadius:12,
          padding:'16px 20px', marginBottom:16, fontSize:14, color:'#8b1a1a',

          <span style={{fontSize:22, flexShrink:0}}>⚠️</span>

      {loading && (
        <div className="card" style={{padding:64, textAlign:'center'}}>

function RemindersPage({ reminders, setReminders, reports, apiKey, addToast }) {

    setReminders(prev => prev.map((r, i) => i === id ? {...r, done: !r.done} : r));
  };

  const scanPrescription = async () => {
    if (!file || !apiKey) return;
    setLoading(true);
    try {
      const b64 = await new Promise(res => {
        const r = new FileReader();
        r.onload = e => res(e.target.result.split(',')[1]);
        r.readAsDataURL(file);
      });

      const prompt = `Analyze this prescription image and extract medicine information.
      
      Return ONLY valid JSON (no markdown, no explanation) in this format:
      [
        {
          "medicine": "Medicine Name",
          "dose": "500mg",
          "frequency": "2 times daily",
          "timing": "morning",
          "instructions": "After food"
        }
      ]
      
      For each medicine found, create separate entries for morning/evening/night doses.
      If you cannot read the prescription clearly, return sample medicines for demonstration.
      Return array of medicine objects only.`;

      const response = await callReport(prompt);
      const clean = response.replace(/```json|```/g, '').trim();
      const medicines = JSON.parse(clean.startsWith('[') ? clean : '[' + clean + ']');

      const timeMap = { morning: { icon:'🌅', label:'Morning', color:'reminder-morning' }, afternoon: { icon:'☀️', label:'Afternoon', color:'reminder-afternoon' }, evening: { icon:'🌆', label:'Evening', color:'reminder-evening' }, night: { icon:'🌙', label:'Night', color:'reminder-night' } };

      const newReminders = medicines.map(m => {
        const t = (m.timing || 'morning').toLowerCase().includes('night') ? 'night' : (m.timing || 'morning').toLowerCase().includes('eve') ? 'evening' : (m.timing || 'morning').toLowerCase().includes('after') ? 'afternoon' : 'morning';
        return {
          medicine: m.medicine,
          dose: m.dose || '1 tablet',
          time: m.instructions || m.frequency || 'As prescribed',
          timing: t,
          icon: timeMap[t].icon,
          label: timeMap[t].label,
          color: timeMap[t].color,
          done: false
        };
      });

      setReminders(prev => [...prev, ...newReminders]);
      addToast(`${newReminders.length} reminders added!`, 'success', '💊');
      setFile(null);
    } catch(e) {
      addToast('Could not scan prescription: ' + e.message, 'warn', '❌');
    } finally {
      setLoading(false);
    }
  };

  const addManual = () => {

    const labels = ['Morning','Afternoon','Evening','Night'];
    const idx = Math.floor(Math.random() * 4);
    setReminders(prev => [...prev, {
      medicine: 'New Medicine', dose: '1 tablet',
      time: 'After food', timing: times[idx], icon: icons[idx],
      label: labels[idx], color: `reminder-${times[idx]}`, done: false
    }]);
  };

  const pending = reminders.filter(r => !r.done);
  const done = reminders.filter(r => r.done);

  return (
    <div>
      <div className="section-title">💊 Medicine Reminders – మందుల గుర్తుపు</div>

      <div className="grid-2" style={{gap:24, marginBottom:24}}>
        <div className="card">
          <div className="card-header"><div className="card-title">📷 Scan Prescription – ప్రిస్క్రిప్షన్ స్కాన్</div></div>
          <div className="card-body">
            <div
              className="upload-zone"
              style={{padding:'28px 20px'}}
              onClick={() => fileRef.current.click()}
            >
              <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e => setFile(e.target.files[0])} />
              <div style={{fontSize:36, marginBottom:8}}>💊</div>
              <div style={{fontWeight:700, fontSize:15}}>Upload Prescription</div>
              <div style={{fontSize:12, color:'var(--text3)', fontFamily:'Tiro Telugu, serif'}}>
                {file ? file.name : 'ప్రిస్క్రిప్షన్ ఫొటో తీయండి'}
              </div>
            </div>
            <button
              className="btn btn-primary w-full mt-4"
              onClick={scanPrescription}
              disabled={!file || loading}
              style={{justifyContent:'center'}}
            >
              {loading ? <><div className="spinner" style={{width:18,height:18,borderWidth:2}} />Scanning...</> : '🔍 Scan & Add Reminders'}
            </button>
          </div>
        </div>

        <div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:16}}>
            {[
              { icon:'💊', label:'Total Reminders', value: reminders.length, color:'var(--sky)' },
              { icon:'✅', label:'Completed Today', value: done.length, color:'var(--leaf)' },
              { icon:'⏰', label:'Pending', value: pending.length, color:'var(--turmeric)' },
              { icon:'📅', label:'Streak', value: '3 days', color:'var(--leaf-light)' },
            ].map((s, i) => (
              <div key={i} className="stat-card ok" style={{paddingTop:18}}>
                <div style={{fontSize:28, marginBottom:6}}>{s.icon}</div>
                <div className="stat-label">{s.label}</div>
                <div style={{fontSize:22, fontWeight:800, color: s.color}}>{s.value}</div>
              </div>
            ))}
          </div>
          <button className="btn btn-secondary w-full" onClick={addManual}>
            ➕ Add Reminder Manually
          </button>
        </div>
      </div>

      <div className="tabs mb-4">
        <button className={`tab ${tab==='today'?'active':''}`} onClick={() => setTab('today')}>
          ⏳ Pending ({pending.length})
        </button>
        <button className={`tab ${tab==='done'?'active':''}`} onClick={() => setTab('done')}>
          ✅ Completed ({done.length})
        </button>
        <button className={`tab ${tab==='all'?'active':''}`} onClick={() => setTab('all')}>
          📋 All ({reminders.length})
        </button>
      </div>

      <div className="flex-col">
        {(tab==='today' ? pending : tab==='done' ? done : reminders).map((r, i) => {
          const realIdx = reminders.indexOf(r);
          return (
            <div key={i} className="reminder-card" style={{opacity: r.done ? 0.65 : 1}}>
              <div className={`reminder-icon-wrap ${r.color}`}>{r.icon}</div>
              <div className="reminder-info">
                <div className="reminder-med" style={{textDecoration: r.done ? 'line-through' : 'none'}}>{r.medicine}</div>
                <div className="reminder-dose">{r.dose} • {r.time}</div>
              </div>
              <span className={`badge ${r.timing==='morning'?'badge-yellow':r.timing==='night'?'badge-blue':r.timing==='evening'?'badge-green':'badge-blue'}`}>
                {r.label}
              </span>
              <div
                className={`reminder-check ${r.done ? 'done' : ''}`}
                onClick={() => toggleDone(realIdx)}
              >
                {r.done && '✓'}
              </div>
              <button className="btn btn-sm" style={{background:'transparent', color:'var(--text3)', padding:'6px 8px'}}
                onClick={() => setReminders(prev => prev.filter((_, idx) => idx !== realIdx))}>
                🗑️
              </button>
            </div>
          );
        })}
        {(tab==='today' ? pending : tab==='done' ? done : reminders).length === 0 && (
          <div className="empty-state">
            <div className="empty-icon">{tab==='done' ? '🎉' : '💊'}</div>
            <div className="empty-text">{tab==='done' ? 'No completed reminders yet' : 'No pending reminders'}</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ────────────── MAIN APP ──────────────
function App() {
  const [page, setPage] = useState('landing');
  const [apiKey, setApiKey] = useState('server-mode'); // API key lives in server .env
  const [showApiModal, setShowApiModal] = useState(false);
  const [serverOk, setServerOk] = useState(null);

  // Check backend server on mount
  useEffect(() => {
    fetch('http://localhost:5000/')
      .then(r => r.ok ? setServerOk(true) : setServerOk(false))
      .catch(() => setServerOk(false));
  }, []);
  const [reports, setReports] = useState([]);
  const [reminders, setReminders] = useState([
    { medicine:'Metformin', dose:'500mg', time:'After breakfast', timing:'morning', icon:'🌅', label:'Morning', color:'reminder-morning', done:false },
    { medicine:'Amlodipine', dose:'5mg', time:'Before dinner', timing:'evening', icon:'🌆', label:'Evening', color:'reminder-evening', done:false },
    { medicine:'Vitamin D3', dose:'60000 IU', time:'After lunch Sunday', timing:'afternoon', icon:'☀️', label:'Afternoon', color:'reminder-afternoon', done:true },
  ]);
  const [toasts, setToasts] = useState([]);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [lang, setLang] = useState("en");

  const addToast = (msg, type = 'success', icon = '✅') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, msg, type, icon }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  };

  const addReport = (report) => {
    setReports(prev => [...prev, report]);
  };

  const saveApiKey = (key) => {
    setApiKey('server-mode');
    setShowApiModal(false);
    setPage('dashboard');
  };

  const navItems = [
    { id:'dashboard', icon:'🏠', label:'Dashboard', te:'డాష్‌బోర్డ్' },
    { id:'records', icon:'📁', label:'Medical Records', te:'వైద్య రికార్డులు', badge: reports.length > 0 ? reports.length : null },
    { id:'upload', icon:'📤', label:'Upload Report', te:'రిపోర్ట్ అప్‌లోడ్' },
    { id:'analysis', icon:'🤖', label:'AI Analysis', te:'AI విశ్లేషణ' },
    { id:'voice', icon:'🎙️', label:'Voice Assistant', te:'వాయిస్ సహాయకుడు' },
    { id:'suggestions', icon:'🌿', label:'Health Tips', te:'ఆరోగ్య సూచనలు' },
    { id:'reminders', icon:'💊', label:'Medicine Reminders', te:'మందుల గుర్తుపు', badge: reminders.filter(r=>!r.done).length || null },
  ];

  const pageTitle = navItems.find(n => n.id === page);
  const pendingReminders = reminders.filter(r => !r.done).length;

  if (page === 'landing') {
    return (
      <>
        <LandingPage onEnter={() => {
          if (!apiKey) setShowApiModal(true);
          else setPage('dashboard');
        }} />
        {showApiModal && <ApiKeyModal onSave={saveApiKey} />}
      </>
    );
  }

  return (
    <div className="app-shell">
      {/* Sidebar Overlay */}
      {sidebarOpen && <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.5)', zIndex:99}} onClick={() => setSidebarOpen(false)} />}

      {/* Sidebar */}
      <aside className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
        <div className="sidebar-brand">
          <div className="brand-logo">🌿</div>
          <div className="brand-name">Arogya Voice</div>
          <div className="brand-sub">ఆరోగ్య వాయిస్</div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section-label">Main Menu</div>
          {navItems.map(item => (
            <div
              key={item.id}
              className={`nav-item ${page === item.id ? 'active' : ''}`}
              onClick={() => { setPage(item.id); setSidebarOpen(false); }}
            >
              <span className="nav-icon">{item.icon}</span>
              <div>
                <div style={{lineHeight:1.2}}>{item.label}</div>
                <div style={{fontSize:10, opacity:0.65, fontFamily:'Tiro Telugu, serif'}}>{item.te}</div>
              </div>
              {item.badge && <span className="nav-badge">{item.badge}</span>}
            </div>
          ))}

          <div className="nav-section-label" style={{marginTop:16}}>Settings</div>
          <div className="nav-item" onClick={() => setShowApiModal(true)}>
            <span className="nav-icon">🔑</span>
            <div>
              <div>API Settings</div>
              <div style={{fontSize:10, opacity:0.65}}>Gemini API Key</div>
            </div>
          </div>
          <div className="nav-item" onClick={() => { setPage('landing'); }}>
            <span className="nav-icon">🏠</span>
            <div>Back to Home</div>
          </div>
        </nav>
        <div className="sidebar-footer">
          <div className="user-chip">
            <div className="user-avatar">రా</div>
            <div>
              <div className="user-name">రాజు గారు</div>
              <div className="user-loc">📍 Nellore, AP</div>
            </div>
          </div>
        </div>
      </aside>

      {/* Main */}
      <main className="main-content">
        <header className="topbar">
          <div style={{display:'flex', alignItems:'center', gap:12}}>
            <button
              style={{background:'none', border:'none', cursor:'pointer', fontSize:22, display:'none'}}
              className="menu-btn"
              onClick={() => setSidebarOpen(!sidebarOpen)}
            >☰</button>
            <div>
              <div className="topbar-title">
                {pageTitle?.icon}{' '}
                {page === 'dashboard' ? translations[lang].dashboard
                  : page === 'upload' || page === 'analysis' ? translations[lang].upload
                  : pageTitle?.label}
              </div>
              <div className="topbar-sub">{pageTitle?.te}</div>
            </div>
          </div>
          <div className="topbar-actions">
            {/* Language Switcher */}
            <select
              value={lang}
              onChange={(e) => setLang(e.target.value)}
              className="lang-select"
              style={{
                padding:'6px 10px', borderRadius:8, border:'1.5px solid var(--border)',
                fontSize:13, fontWeight:600, color:'var(--text)', background:'var(--surface)',
                cursor:'pointer', outline:'none', fontFamily:'Sora, sans-serif'
              }}
            >
              <option value="en">English</option>
              <option value="te">తెలుగు</option>
              <option value="hi">हिंदी</option>
            </select>
            {pendingReminders > 0 && (
              <div style={{
                background:'#fff3d6', border:'1px solid #f5cc80',
                borderRadius:8, padding:'6px 12px', fontSize:12, fontWeight:600, color:'#7a4a00',
                cursor:'pointer'
              }} onClick={() => setPage('reminders')}>
                💊 {pendingReminders} pending
              </div>
            )}
            <div style={{
              width:36, height:36, borderRadius:'50%',
              background: serverOk ? 'var(--leaf)' : serverOk === false ? 'var(--critical)' : 'var(--border)',
              display:'flex', alignItems:'center', justifyContent:'center',
              color:'#fff', fontSize:16, cursor:'default',
              title: serverOk ? 'Server connected' : 'Server offline'
            }}>
              {serverOk ? '✅' : serverOk === false ? '❌' : '⏳'}
            </div>
          </div>
        </header>

        <div className="page-body">
          <ServerStatusBanner
            serverOk={serverOk}
            onCheck={() => {
              setServerOk(null);
              fetch('http://localhost:5000/')
                .then(r => r.ok ? setServerOk(true) : setServerOk(false))
                .catch(() => setServerOk(false));
            }}
          />

          {page === 'dashboard' && <Dashboard reports={reports} reminders={reminders} setPage={setPage} lang={lang} />}
          {page === 'records' && <RecordsPage reports={reports} setReports={setReports} addToast={addToast} />}
          {page === 'upload' && <UploadPage apiKey={apiKey} addReport={addReport} addToast={addToast} lang={lang} />}
          {page === 'analysis' && <UploadPage apiKey={apiKey} addReport={addReport} addToast={addToast} lang={lang} />}
          {page === 'voice' && <VoiceAssistant apiKey={apiKey} addToast={addToast} />}
          {page === 'suggestions' && <SuggestionsPage reports={reports} apiKey={apiKey} addToast={addToast} />}
          {page === 'reminders' && <RemindersPage reminders={reminders} setReminders={setReminders} reports={reports} apiKey={apiKey} addToast={addToast} />}
        </div>
      </main>

      {showApiModal && <ApiKeyModal onSave={saveApiKey} />}
      <Toast toasts={toasts} />

      <style>{`
        @media (max-width: 900px) {
          .menu-btn { display: block !important; }
        }
      `}</style>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
